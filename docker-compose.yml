services:
  postgres:
    image: postgres:18.1
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: vetcrm
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d vetcrm"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "127.0.0.1:8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT}
      ConnectionStrings__Default: ${CONNECTION_STRING_DEFAULT}
      Jwt__Secret: ${JWT_SECRET}
      Jwt__Issuer: ${JWT_ISSUER}
      Jwt__Audience: ${JWT_AUDIENCE}
      Cors__AllowedOrigins__0: "https://lapapro.ru"
      Cors__AllowedOrigins__1: "https://www.lapapro.ru"
      Cors__AllowedOrigins__2: "https://api.lapapro.ru"
      Cors__AllowedOrigins__3: "https://www.api.lapapro.ru"
      Cors__AllowedOrigins__4: "http://localhost:3000"
      Cors__AllowedOrigins__5: "http://127.0.0.1:3000"

volumes:
  postgres_data:
